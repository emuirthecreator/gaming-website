<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Hub - Play 26+ HTML5 Games</title>
    <meta name="description" content="Play 26 HTML5 games online! Snake, Flappy Bird, Memory, Wordle, and more. Free gaming hub with leaderboards and save system.">
    <meta name="keywords" content="HTML5 games, online games, free games, snake, flappy bird, memory games">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🎮 Gaming Hub</h1>
            <p>Play 26+ HTML5 Games | Save Your Progress | Compete on Leaderboards</p>
        </header>

        <!-- Navigation -->
        <nav class="navbar">
            <button class="nav-btn active" onclick="showSection('home')">Home</button>
            <button class="nav-btn" onclick="showSection('games')">Games</button>
            <button class="nav-btn" onclick="showSection('leaderboard')">Leaderboard</button>
            <button class="nav-btn" onclick="showSection('profile')">Profile</button>
        </nav>

        <!-- Home Section -->
        <section id="home" class="section active">
            <div class="home-content">
                <h2>Welcome to Gaming Hub!</h2>
                <p>Choose from 26 exciting games and compete with players worldwide.</p>
                <button class="btn-primary" onclick="showSection('games')">Start Playing →</button>
                <div class="stats">
                    <div class="stat-card">
                        <h3>26+</h3>
                        <p>Games</p>
                    </div>
                    <div class="stat-card">
                        <h3>∞</h3>
                        <p>Play Time</p>
                    </div>
                    <div class="stat-card">
                        <h3>☁️</h3>
                        <p>Cloud Saves</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Games Section -->
        <section id="games" class="section">
            <h2>Available Games</h2>
            <div class="games-grid" id="gamesGrid"></div>
        </section>

        <!-- Leaderboard Section -->
        <section id="leaderboard" class="section">
            <h2>Global Leaderboard</h2>
            <div id="leaderboardContent"></div>
        </section>

        <!-- Profile Section -->
        <section id="profile" class="section">
            <h2>Your Profile</h2>
            <div id="profileContent"></div>
        </section>

        <!-- Game Modal -->
        <div id="gameModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeGame()">&times;</span>
                <div id="gameContainer"></div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/games.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
